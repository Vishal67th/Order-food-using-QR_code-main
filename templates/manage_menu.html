{% extends 'base.html' %}

{%block title%} Manage Menu {%endblock title%}

{% block body %}

{% for message in messages %}
    <div class="alert alert-success alert-dismissable fade show" role="alert">
        <strong>{{message}}</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
{% endfor %}

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">Add New Dish to Menu</h3>
                </div>
                <div class="card-body">
                    <form method="POST" action="/manage_menu" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="form-group mb-3">
                            <label for="name" class="form-label">Dish Name *</label>
                            <input type="text" name="name" class="form-control" id="name" placeholder="Enter name of dish" required>
                        </div>

                        <div class="form-group mb-3">
                            <label for="cat" class="form-label">Category *</label>
                            <select name="cat" class="form-control" id="cat" required>
                                <option value="" disabled selected>Select Category</option>
                                <option value="papad">Papad</option>
                                <option value="starter">Starter</option>
                                <option value="gravy">Gravy</option>
                                <option value="bread">Bread</option>
                                <option value="dal">Dal</option>
                                <option value="rice">Rice</option>
                                <option value="dessert">Dessert</option>
                                <option value="beverage">Beverage</option>
                            </select>
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="price" class="form-label">Price (₹) *</label>
                            <input type="number" name="price" id="price" placeholder="Enter price" class="form-control" min="0" max="9999" required />
                        </div>
                        
                        <div class="form-group mb-3">
                            <label for="desc" class="form-label">Description *</label>
                            <textarea name="desc" class="form-control" id="desc" placeholder="Enter description of dish" rows="3" required></textarea>
                        </div>

                        <div class="form-group mb-3">
                            <label for="img" class="form-label">Upload Image *</label>
                            <input type="file" name="img" id="img" accept="image/*" class="form-control" required/>
                        </div>

                        <button type="submit" class="btn btn-primary btn-block w-100">Add Dish</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
