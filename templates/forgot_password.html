{% extends 'base.html' %}

{% block title %}Forgot Password{% endblock title %}

{% block body %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
  crossorigin="anonymous"></script>

<section class="vh-100 d-flex align-items-center justify-content-center">
  <div class="col-md-5 col-lg-4 col-xl-3 px-3">

    <h4 class="fw-bold mb-1">Forgot Password?</h4>
    <p class="text-muted mb-4">Enter your registered mobile number to reset your password.</p>

    {% for message in messages %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
      <strong>{{ message }}</strong>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}

    <form method="post" action="{% url 'forgot_password' %}">
      {% csrf_token %}
      <div class="form-outline mb-4">
        <label class="form-label" for="phone">Mobile Number</label>
        <input type="text" id="phone" name="phone"
          class="form-control form-control-lg"
          placeholder="Enter your 10-digit number" maxlength="10" required autofocus />
      </div>
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary btn-lg">Continue</button>
      </div>
      <p class="text-center">
        <a href="{% url 'login' %}" class="text-body">&larr; Back to Login</a>
      </p>
    </form>

  </div>
</section>

{% endblock body %}
