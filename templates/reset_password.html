{% extends 'base.html' %}

{% block title %}Reset Password{% endblock title %}

{% block body %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/js/bootstrap.bundle.min.js"
  integrity="sha384-OERcA2EqjJCMA+/3y+gxIOqMEjwtxJY7qPCqsdltbNJuaOe923+mo//f6V8Qbsw3"
  crossorigin="anonymous"></script>

<section class="vh-100 d-flex align-items-center justify-content-center">
  <div class="col-md-5 col-lg-4 col-xl-3 px-3">

    <h4 class="fw-bold mb-1">Set New Password</h4>
    <p class="text-muted mb-4">Enter and confirm your new password below.</p>

    {% for message in messages %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
      <strong>{{ message }}</strong>
      <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    {% endfor %}

    <form method="post" action="{% url 'reset_password' %}">
      {% csrf_token %}

      <div class="form-outline mb-3">
        <label class="form-label" for="password1">New Password</label>
        <input type="password" id="password1" name="password1"
          class="form-control form-control-lg"
          placeholder="Enter new password" minlength="4" required autofocus />
      </div>

      <div class="form-outline mb-4">
        <label class="form-label" for="password2">Confirm Password</label>
        <input type="password" id="password2" name="password2"
          class="form-control form-control-lg"
          placeholder="Re-enter new password" minlength="4" required />
      </div>

      <!-- Live mismatch warning -->
      <p id="mismatch-msg" class="text-danger small d-none mb-2">Passwords do not match.</p>

      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-success btn-lg" id="submit-btn">Reset Password</button>
      </div>
      <p class="text-center">
        <a href="{% url 'login' %}" class="text-body">&larr; Back to Login</a>
      </p>
    </form>

  </div>
</section>

<script>
  const p1 = document.getElementById('password1');
  const p2 = document.getElementById('password2');
  const msg = document.getElementById('mismatch-msg');
  const btn = document.getElementById('submit-btn');

  [p1, p2].forEach(el => el.addEventListener('input', () => {
    const mismatch = p2.value.length > 0 && p1.value !== p2.value;
    msg.classList.toggle('d-none', !mismatch);
    btn.disabled = mismatch;
  }));
</script>

{% endblock body %}
